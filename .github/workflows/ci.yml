name: CI

# Build + test on Linux (L2-QLT-001: Linux-first deployment) and audit the
# dependency license set (L2-QLT-003: Apache-2.0 compatibility enforced in CI).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  license-audit:
    # L2-QLT-003: fail the build when a dependency's license is incompatible
    # with Apache-2.0 (notably copyleft: GPL/AGPL/LGPL families).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Install nuget-license
        run: dotnet tool install --global nuget-license

      - name: Audit dependency licenses
        # license-url-mappings.json maps packages that publish only a license
        # URL (not an SPDX expression) to their verified SPDX identifier.
        run: >
          nuget-license -i Tranquility.slnx -t
          -a "Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;MS-PL;0BSD"
          -mapping build/license-url-mappings.json
          -o JsonPretty

      - name: License gate control tests (L2-QLT-003)
        # Negative control: proves the gate can fail on a disallowed license.
        run: dotnet test --configuration Release --filter "Category=LicenseAudit"

  perf-smoke:
    # L2-QLT-004 verification: the deterministic Core throughput gate on every PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Perf smoke (declared targets)
        run: dotnet test --configuration Release --filter "Category=PerfSmoke"

  perf-full:
    # Full declared-target verification via the standalone benchmark; scheduled
    # and manually dispatchable so it never blocks PRs on socket-timing noise.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Performance gate
        run: dotnet run --project tests/Tranquility.Benchmarks --configuration Release -- tests/fixtures/xtce/SampleSat.xml

  windows-matrix:
    # Dev platform is Windows, CI merge gate is Linux; keep both honest nightly.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build and test
        run: dotnet test --configuration Release
